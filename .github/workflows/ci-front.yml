name: Deploy Frontend to S3

on:
  push:
    branches: [ "main" ] # 배포를 트리거할 브랜치명 (필요시 수정)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v4

    - name: Node.js 환경 세팅
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 패키지 설치
      run: npm install

    - name: 빌드 전 환경 변수(.env.production) 생성 및 주입
      run: |
        echo "VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }}" >> .env.production
        echo "VITE_BACKEND_WS_URL=${{ secrets.VITE_BACKEND_WS_URL }}" >> .env.production
        echo "VITE_S3_BUCKET_URL=${{ secrets.VITE_S3_BUCKET_URL }}" >> .env.production
        # 향후 AI 스트리밍 서버 주소가 확정되면 아래처럼 추가
        # echo "VITE_STREAM_BASE_URL=${{ secrets.VITE_STREAM_BASE_URL }}" >> .env.production

    - name: 리액트(Vite) 프로젝트 빌드
      run: npm run build

    - name: AWS 인증 정보 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: 빌드된 결과물(dist)을 S3 버킷에 동기화 (기존 파일 덮어쓰기/삭제)
      run: |
        aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
        echo "==== 프론트엔드 S3 배포 완료! ===="