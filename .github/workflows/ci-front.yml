name: Deploy Frontend to ECR & Update Infra

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: smart-safety-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 소스코드 가져오기
      uses: actions/checkout@v4

    - name: 2. AWS 인증 정보 설정
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 3. Amazon ECR 로그인
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: 4. 도커 이미지 빌드 및 ECR 푸시 (환경 변수 빌드 주입 포함)
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --build-arg VITE_BACKEND_BASE_URL="${{ secrets.VITE_BACKEND_BASE_URL }}" \
          --build-arg VITE_BACKEND_WS_URL="${{ secrets.VITE_BACKEND_WS_URL }}" \
          --build-arg VITE_S3_BUCKET_URL="${{ secrets.VITE_S3_BUCKET_URL }}" \
          --build-arg VITE_WEBRTC_BASE_URL="${{ secrets.VITE_WEBRTC_BASE_URL }}" \
          --build-arg VITE_HLS_BASE_URL="${{ secrets.VITE_HLS_BASE_URL }}" \
          --build-arg VITE_MJPEG_BASE_URL="${{ secrets.VITE_MJPEG_BASE_URL }}" \
          --build-arg VITE_STREAM_MODE="mjpeg" \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

    - name: 5. 인프라(Infra) 레포지토리 체크아웃
      uses: actions/checkout@v4
      with:
        repository: strangeRookies/infra
        token: ${{ secrets.PAT_TOKEN }}
        path: infra-repo

    - name: 6. 쿠버네티스 설정 파일 업데이트 및 커밋
      run: |
        cd infra-repo
        sed -i "s|image: .*/smart-safety-frontend:.*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}|g" k8s/frontend/deployment.yaml
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/frontend/deployment.yaml
        git diff --staged --quiet || git commit -m "🚀 Update frontend image tag to ${{ env.IMAGE_TAG }}"
        git push origin main || echo "No changes to push"