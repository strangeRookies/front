name: React CI (Front)

on:
  push:
    branches: [ "test-frontend" ]
  pull_request:
    branches: [ "test-frontend" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm install
    - name: Build
      run: npm run build